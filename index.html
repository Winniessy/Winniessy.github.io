<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Winniessy 的学习记录</title>
  <meta name="description" content="Winniessy 的项目文档、学习记录和踩坑笔记。">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    :root {
      --theme-color: #256f5d;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
    }

    .markdown-section {
      max-width: 860px;
    }

    .markdown-section h1,
    .markdown-section h2,
    .markdown-section h3 {
      letter-spacing: 0;
    }

    .markdown-section code {
      border-radius: 4px;
    }
    .journey-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      margin: 28px 0 36px;
    }

    .journey-card {
      min-height: 140px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 18px;
      padding: 20px;
      border: 1px solid rgba(37, 111, 93, 0.18);
      border-radius: 8px;
      color: #172026;
      background: #f8fbfa;
      text-decoration: none !important;
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .journey-card:hover {
      transform: translateY(-2px);
      border-color: rgba(37, 111, 93, 0.48);
      box-shadow: 0 12px 28px rgba(23, 32, 38, 0.08);
    }

    .journey-card span {
      color: #1f5f50;
      font-size: 1.12rem;
      font-weight: 700;
    }

    .journey-card small {
      color: #5d6c67;
      line-height: 1.55;
    }
  </style>
</head>
<body>
  <div id="app">加载中...</div>
  <script>
    window.$docsify = {
      name: 'Winniessy',
      repo: 'Winniessy/Winniessy.github.io',
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true,
      homepage: 'README.md',
      search: {
        placeholder: '搜索',
        noData: '没有找到结果',
        depth: 3
      }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
</body>
</html>
